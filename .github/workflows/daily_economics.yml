name: Daily Economics News Bot

on:
  schedule:
    # 毎朝7時 JST = UTC 前日22:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch economics news and generate HTML
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_economics.py

      - name: Commit and push economics_news.html
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add economics_news.html
          git diff --staged --quiet && echo "変更なし。スキップ。" || (
            git commit -m "📈 経済ニュース更新: $(TZ='Asia/Tokyo' date +'%Y-%m-%d %H:%M JST')" &&
            git push
          )
